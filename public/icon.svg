<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Triskel celtique simplifié - 3 spirales en rotation -->
  <g transform="translate(100,100)">
    <!-- Spirale 1 (haut) -->
    <path d="M0,-60 C10,-60 30,-50 30,-30 C30,-10 10,0 0,0 C-10,0 -30,-10 -30,-30 C-30,-50 -10,-60 0,-60 Z" 
          stroke="currentColor" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M0,-30 C5,-30 15,-25 15,-15 C15,-5 5,0 0,0" 
          stroke="currentColor" stroke-width="3" fill="none" opacity="0.6"/>
    
    <!-- Spirale 2 (bas-droite) -->
    <g transform="rotate(120)">
      <path d="M0,-60 C10,-60 30,-50 30,-30 C30,-10 10,0 0,0 C-10,0 -30,-10 -30,-30 C-30,-50 -10,-60 0,-60 Z" 
            stroke="currentColor" stroke-width="4" fill="none" opacity="0.6"/>
      <path d="M0,-30 C5,-30 15,-25 15,-15 C15,-5 5,0 0,0" 
            stroke="currentColor" stroke-width="3" fill="none" opacity="0.6"/>
    </g>
    
    <!-- Spirale 3 (bas-gauche) -->
    <g transform="rotate(240)">
      <path d="M0,-60 C10,-60 30,-50 30,-30 C30,-10 10,0 0,0 C-10,0 -30,-10 -30,-30 C-30,-50 -10,-60 0,-60 Z" 
            stroke="currentColor" stroke-width="4" fill="none" opacity="0.6"/>
      <path d="M0,-30 C5,-30 15,-25 15,-15 C15,-5 5,0 0,0" 
            stroke="currentColor" stroke-width="3" fill="none" opacity="0.6"/>
    </g>
    
    <!-- Centre -->
    <circle cx="0" cy="0" r="6" fill="currentColor" opacity="0.5"/>
  </g>
</svg>
